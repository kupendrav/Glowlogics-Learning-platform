<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Glowlogics Learning | Courses')}"></head>
<body data-page="courses">
<div th:replace="~{fragments/nav :: nav(${learner})}"></div>

<main class="container section-gap">
    <section class="page-intro reveal">
        <p class="eyebrow">Course catalog</p>
        <h1>Browse Courses</h1>
        <p>Discover practical learning tracks with roadmap, YouTube lessons, resources, and progress tracking.</p>
    </section>

    <section class="panel reveal">
        <form method="get" th:action="@{/courses}" class="search-form">
            <input type="search" name="q" th:value="${query}" placeholder="Search by title, category, level..."/>

            <select name="category">
                <option value="" th:selected="${selectedCategory == ''}">All categories</option>
                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${selectedCategory == cat}"></option>
            </select>

            <button type="submit" class="search-icon-btn" aria-label="Search courses">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M10.5 3a7.5 7.5 0 1 1 0 15 7.5 7.5 0 0 1 0-15Zm0 2a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Zm6.06 11.64 4.15 4.15-1.42 1.41-4.14-4.14 1.41-1.42Z"></path>
                </svg>
                <span class="sr-only">Search</span>
            </button>
        </form>

        <div class="state-block" th:if="${#lists.isEmpty(courses)}">
            <p>No courses found. Try a different keyword.</p>
        </div>

        <div class="course-grid catalog-grid" th:unless="${#lists.isEmpty(courses)}">
            <article class="course-card reveal" th:each="course : ${courses}">
                <img class="course-card-image" th:src="${course.imageUrl}" src="/images/learning-path.svg"
                     th:alt="|${course.title} cover|" alt="Course cover"/>

                <p class="meta-row">
                    <span th:text="${course.category}">Category</span>
                    <span th:text="${course.duration}">Duration</span>
                </p>

                <h2 th:text="${course.title}">Course title</h2>
                <p th:text="${course.description}">Description</p>

                <p class="meta-row light">
                    <span th:text="${course.level}">Level</span>
                    <span><strong th:text="${#lists.size(course.lessons)}">0</strong> lessons</span>
                </p>

                <a class="button tiny" th:href="@{/courses/{slug}(slug=${course.slug})}">View Details</a>
            </article>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script type="module" th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
