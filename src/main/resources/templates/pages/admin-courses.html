<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Glowlogics Learning | Admin Courses')}"></head>
<body data-page="admin">
<div th:replace="~{fragments/nav :: nav(${learner})}"></div>

<main class="container section-gap">
    <section class="page-intro reveal">
        <p class="eyebrow">Admin panel</p>
        <h1>Manage Course Catalog</h1>
        <p>Add new courses or edit existing metadata from a single dashboard.</p>
    </section>

    <section class="panel reveal">
        <h2>Add Course</h2>
        <div class="state-block success" th:if="${adminSuccess}" th:text="${adminSuccess}">Saved.</div>
        <form method="post" th:action="@{/admin/courses}" class="stack-form two-col">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <label>Title</label>
            <input name="title" required/>

            <label>Description</label>
            <textarea name="description" required></textarea>

            <label>Category</label>
            <input name="category" required/>

            <label>Duration</label>
            <input name="duration" placeholder="e.g. 12 weeks" required/>

            <label>Level</label>
            <input name="level" placeholder="e.g. Beginner" required/>

            <label class="inline-check">
                <input type="checkbox" name="featured" value="true"/>
                Featured course
            </label>

            <button class="button" type="submit">Add Course</button>
        </form>
    </section>

    <section class="section-gap reveal">
        <h2>Edit Existing Courses</h2>
        <div class="course-grid">
            <article class="course-card" th:each="course : ${courses}">
                <img class="course-card-image" th:src="${course.imageUrl}" src="/images/learning-path.svg"
                     th:alt="|${course.title} cover|" alt="Course cover"/>

                <form method="post" th:action="@{/admin/courses/{id}(id=${course.id})}" class="stack-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <label>Title</label>
                    <input name="title" th:value="${course.title}" required/>

                    <label>Description</label>
                    <textarea name="description" required th:text="${course.description}"></textarea>

                    <label>Category</label>
                    <input name="category" th:value="${course.category}" required/>

                    <label>Duration</label>
                    <input name="duration" th:value="${course.duration}" required/>

                    <label>Level</label>
                    <input name="level" th:value="${course.level}" required/>

                    <label class="inline-check">
                        <input type="checkbox" name="featured" value="true" th:checked="${course.featured}"/>
                        Featured
                    </label>

                    <button class="button tiny" type="submit">Save Changes</button>
                </form>
            </article>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script type="module" th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
