<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Glowlogics Learning | Sign Up')}"></head>
<body data-page="signup">
<div th:replace="~{fragments/nav :: nav(${learner})}"></div>

<main class="container auth-shell reveal">
    <section class="auth-card">
        <h1>Create your account</h1>
        <p>Start learning and track your progress across devices with local and server sync.</p>

        <div class="state-block error" th:if="${signupError}" th:text="${signupError}">Unable to create account.</div>

        <form method="post" th:action="@{/signup}" class="stack-form">
            <label for="username">Username</label>
            <input id="username" name="username" minlength="3" required th:value="${signupUsername}"/>

            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required/>

            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required/>

            <button class="button" type="submit">Create Account</button>
        </form>

        <p class="helper-text">Already have an account? <a th:href="@{/login}">Login</a>.</p>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script type="module" th:src="@{/js/app.js}" src="/js/app.js"></script>
</body>
</html>
